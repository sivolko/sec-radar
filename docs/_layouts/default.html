<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="alternate" type="application/atom+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
  {% seo %}
</head>
<body>

<header class="site-header">
  <div class="container">
    <a class="site-brand" href="{{ '/' | relative_url }}">
      <span class="brand-icon">⛡</span>
      <span class="brand-name">Sec Radar</span>
    </a>
    <nav class="site-nav">
      <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>Feed</a>
      <a href="{{ '/archive' | relative_url }}" {% if page.url contains 'archive' %}class="active"{% endif %}>Archive</a>
      <a href="{{ '/feed.xml' | relative_url }}" title="RSS Feed">RSS</a>
      <button class="theme-toggle" id="themeToggle" title="Toggle theme">☀</button>
    </nav>
  </div>
</header>

<main class="site-main">
  {{ content }}
</main>

<footer class="site-footer">
  <div class="container">
    <p>Updated daily via GitHub Actions &middot; <a href="https://github.com/sivolko/sec-radar">Source</a></p>
  </div>
</footer>

<script>
  const toggle = document.getElementById('themeToggle');
  const html = document.documentElement;
  const saved = localStorage.getItem('theme') || 'dark';
  html.setAttribute('data-theme', saved);
  toggle.textContent = saved === 'dark' ? '☀' : '☾';
  toggle.addEventListener('click', () => {
    const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', next);
    toggle.textContent = next === 'dark' ? '☀' : '☾';
    localStorage.setItem('theme', next);
  });
</script>
</body>
</html>
